services:

  postgres:
    image: postgres:16-alpine
    container_name: applicatieplaat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: appwachtwoord
      POSTGRES_DB: applicatieplaat
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - app-network

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: applicatieplaat-keycloak
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/applicatieplaat
      KC_DB_SCHEMA: keycloak
      KC_DB_USERNAME: appuser
      KC_DB_PASSWORD: appwachtwoord
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - app-network

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: applicatieplaat-app
    restart: unless-stopped
    environment:
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=lokaal-geheim-verander-in-productie
      - KEYCLOAK_ID=applicatieplaat
      - KEYCLOAK_SECRET=wordt-later-ingevuld
      - KEYCLOAK_ISSUER=http://localhost:8080/realms/applicatieplaat
      - DATABASE_URL=postgresql://appuser:appwachtwoord@postgres:5432/applicatieplaat
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - postgres
      - keycloak
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
